version: "3.8"

services:
  node_mienbac:
    image: mysql:8.0
    container_name: mienbac_server
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_mienbac
    ports:
      - "3311:3306"
    volumes:
      - ./init_bac.sql:/docker-entrypoint-initdb.d/init.sql

  node_miennam:
    image: mysql:8.0
    container_name: miennam_server
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_miennam
    ports:
      - "3322:3306"
    volumes:
      - ./init_nam.sql:/docker-entrypoint-initdb.d/init.sql
